<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>calmapp</title>

<style>
:root {
    --bg-color: #0f172a;
    --fg-color: #e2e8f0;
    --accent-color: #38bdf8;
    --finish-color: #4ade80;
}

body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
    color: var(--fg-color);
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
}

/* 🌊 背景ノイズ */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("https://upload.wikimedia.org/wikipedia/commons/5/57/Noise.png");
    opacity: 0.5;
    filter: blur(6px);
    z-index: 0;
}

/* UI上に乗せる */
#app-container, #log-area {
    position: relative;
    z-index: 1;
}

#app-container {
    flex: 1;
    display: flex;
    position: relative;
    cursor: pointer;
}

.tap-zone {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

#center-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

#status {
    font-size: 1.1rem;
    margin-bottom: 24px;
    color: var(--accent-color);
    font-weight: bold;
}

#vol-circle {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
}

#vol-value {
    font-size: 4rem;
}

#instructions {
    margin-top: 16px;
    font-size: 0.8rem;
    line-height: 1.4;
    opacity: 0.85;
}

#log-area {
    height: 120px;
    background: rgba(0,0,0,0.4);
    overflow-y: auto;
    padding: 12px;
    font-family: monospace;
    font-size: 0.75rem;
}

body.is-playing #vol-circle {
    border-color: var(--accent-color);
}

body.is-finished #vol-circle {
    border-color: var(--finish-color);
}
</style>
</head>

<body>

<audio id="noise" src="calmapp.m4a" loop preload="auto" crossorigin="anonymous"></audio>

<div id="app-container">
    <div class="tap-zone" onclick="handleLeftTap()">⬇️</div>

    <div id="center-display">
        <div id="status">TAP TO START</div>

        <div id="vol-circle">
            <span id="vol-value">0</span>
        </div>

        <div id="instructions">
            👉 Tap right / SPACE = 🔊 Up<br>
            👉 Tap left / D = 🔉 Down<br>
            👉 S = ⛔ Stop<br><br>

            👉 右タップ / SPACE = 音量アップ<br>
            👉 左タップ / D = 音量ダウン<br>
            👉 S = 停止
        </div>
    </div>

    <div class="tap-zone" onclick="handleRightTap()">⬆️</div>
</div>

<div id="log-area"></div>

<script>
const DISPLAY_STEP = 10;
const FADE_TIME_PER_STEP = 21;
const MAX_LOGICAL_VOL = 100;
const REAL_VOL_LIMIT = 0.5; // 💎2倍

const TICK_DECREASE = DISPLAY_STEP / FADE_TIME_PER_STEP / 60;

let state = {
    isPlaying: false,
    logicalVol: 0,
    mainLoop: null
};

let isManualChange = false;

const audio = document.getElementById("noise");

let audioCtx = null;
let gainNode = null;
let sourceNode = null;

function initAudioGraph() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0;

    sourceNode = audioCtx.createMediaElementSource(audio);
    sourceNode.connect(gainNode);
    gainNode.connect(audioCtx.destination);
}

function logEvent(action) {
    const el = document.createElement('p');
    el.textContent = action;
    document.getElementById('log-area').prepend(el);
}

function runLoop() {
    if (!state.isPlaying) return;

    if (state.logicalVol > 0) {
        state.logicalVol -= TICK_DECREASE;
    } else {
        finish();
        return;
    }

    let realVol = (state.logicalVol / 100) * REAL_VOL_LIMIT;

    if (isManualChange) {
        gainNode.gain.value = realVol;
        isManualChange = false;
    } else {
        gainNode.gain.value += (realVol - gainNode.gain.value) * 0.08;
    }

    document.getElementById('vol-value').textContent = Math.round(state.logicalVol);

    state.mainLoop = requestAnimationFrame(runLoop);
}

function startApp() {
    initAudioGraph();
    audioCtx.resume();

    state.isPlaying = true;
    state.logicalVol = 100;

    document.body.classList.add('is-playing');

    audio.currentTime = 0;
    gainNode.gain.value = 0;

    audio.play();

    runLoop();
}

function handleUp() {
    if (!state.isPlaying) startApp();
    else {
        state.logicalVol += DISPLAY_STEP;
        isManualChange = true;
    }
}

function handleDown() {
    if (!state.isPlaying) return;
    state.logicalVol -= DISPLAY_STEP;
    isManualChange = true;
}

function finish() {
    state.isPlaying = false;
    cancelAnimationFrame(state.mainLoop);
    document.body.classList.add('is-finished');
}

document.body.addEventListener("touchstart", () => {
    initAudioGraph();
    audioCtx.resume();
    audio.play();
}, { once: true });
</script>

</body>
</html>
