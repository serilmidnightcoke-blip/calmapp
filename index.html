<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>静寂の盾 (Silence Shield) - Brown Noise Edition</title>
    <style>
        /* --- CSS: デザイン --- */
        :root {
            --bg-color: #1a1a2e;
            --fg-color: #e9e9e9;
            --accent-color: #4e9af1;
            --finish-color: #a3cb38;
            --font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--fg-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
        }

        #app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
        }

        #display-area {
            text-align: center;
        }

        #status {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        #vol-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid var(--fg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: border-color 0.3s, transform 0.1s ease-out;
            position: relative;
        }

        #vol-value {
            font-size: 3rem;
            font-weight: bold;
        }

        #pc-instruction {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            #pc-instruction { display: none; }
        }

        #log-area {
            height: 150px;
            background-color: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
            padding: 10px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #aaa;
        }

        #log-area p { margin: 2px 0; }

        body.is-playing #vol-circle { transform: scale(1.05); }
        body.is-finished #vol-circle { border-color: var(--finish-color); animation: pulse 2s infinite; }
        body.is-finished #status { color: var(--finish-color); }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="app-container" onclick="handleTap()">
        <div id="display-area">
            <div id="status">Tap to Start</div>
            <div id="vol-circle">
                <span id="vol-value">0</span>
            </div>
            <div id="pc-instruction">[SPACE] to UP, [S] to STOP</div>
        </div>
    </div>

    <div id="log-area">
        <p>-- Session Logs --</p>
    </div>

    <script>
        /* --- JS: ロジックと音声制御 --- */

        const VOL_STEP = 0.1;
        const FADE_TIME = 7;

        let state = {
            isPlaying: false,
            isFinished: false,
            currentVolume: 0,
            fadeTimer: null,
        };

        let audioCtx, noiseNode, gainNode;
        const logArea = document.getElementById('log-area');

        function logEvent(action, extra = '') {
            const now = new Date();
            const timeStr = now.toISOString().substring(11, 19);
            const el = document.createElement('p');
            el.textContent = `[${timeStr}] ${action.toUpperCase()} - Vol: ${state.currentVolume.toFixed(2)} ${extra}`;
            logArea.appendChild(el);
            logArea.scrollTop = logArea.scrollHeight;
        }

        // --- ブラウンノイズ生成 (新しい呪文) ---
        function createWhiteNoise(ctx) {
            const bufferSize = 2 * ctx.sampleRate;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const output = buffer.getChannelData(0);
            
            let lastOut = 0.0;
            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                // ブラウンノイズの計算（高音をカットして低音を強調）
                output[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = output[i];
                output[i] *= 3.5; // 音量バランス調整
            }
            
            const node = ctx.createBufferSource();
            node.buffer = buffer;
            node.loop = true;
            return node;
        }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            noiseNode = createWhiteNoise(audioCtx);
            gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);

            noiseNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            noiseNode.start();
        }

        function startSession() {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            state.isPlaying = true;
            state.isFinished = false;
            document.body.classList.add('is-playing');
            document.body.classList.remove('is-finished');
            document.getElementById('status').textContent = "Shield Deploying...";
            
            setVolumeWithFade(0.5); 
            logEvent('start');
        }

        function stopSession(isAutoFinish = false) {
            if (!state.isPlaying) return;

            state.isPlaying = false;
            state.currentVolume = 0;
            
            if (gainNode) {
                gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            }

            document.body.classList.remove('is-playing');
            document.getElementById('vol-value').textContent = "0";

            if (isAutoFinish) {
                state.isFinished = true;
                document.body.classList.add('is-finished');
                document.getElementById('status').textContent = "完了 - Stability Achieved";
                logEvent('finished');
            } else {
                document.getElementById('status').textContent = "Tap to Restart";
                logEvent('stop');
            }
        }

        function setVolumeWithFade(newVol) {
            state.currentVolume = Math.min(Math.max(newVol, 0), 1.0);
            document.getElementById('vol-value').textContent = Math.round(state.currentVolume * 100);

            const now = audioCtx.currentTime;
            gainNode.gain.cancelScheduledValues(now);
            gainNode.gain.setValueAtTime(gainNode.gain.value, now); // 今の音量からスタート
            
            // 手動アップ
            gainNode.gain.linearRampToValueAtTime(state.currentVolume, now + 0.1);
            
            // 7秒かけて1段分下げる予約
            const targetVol = Math.max(state.currentVolume - VOL_STEP, 0);
            gainNode.gain.linearRampToValueAtTime(targetVol, now + FADE_TIME);

            logEvent('set_fade', `-> Target: ${targetVol.toFixed(2)}`);

            clearTimeout(state.fadeTimer);
            if (state.currentVolume > 0) {
                state.fadeTimer = setTimeout(() => {
                    checkAutoFinish();
                }, FADE_TIME * 1000); 
            }
        }
        
        function checkAutoFinish() {
            if (!state.isPlaying) return;
            
            state.currentVolume = Math.max(state.currentVolume - VOL_STEP, 0);
            document.getElementById('vol-value').textContent = Math.round(state.currentVolume * 100);
            logEvent('auto_down_step');

            if (state.currentVolume <= 0) {
                stopSession(true);
            } else {
                state.fadeTimer = setTimeout(() => {
                    checkAutoFinish();
                }, FADE_TIME * 1000);
            }
        }

        function volumeUp() {
            if (!state.isPlaying) {
                startSession();
                return;
            }
            logEvent('op_up');
            setVolumeWithFade(state.currentVolume + VOL_STEP);
        }

        function handleTap() {
            if (state.isPlaying) {
                volumeUp();
            } else {
                startSession();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                volumeUp();
            } else if (e.code === 'KeyS') {
                stopSession();
            }
        });
    </script>
</body>
</html>
