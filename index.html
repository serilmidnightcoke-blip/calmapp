<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>calmapp</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --fg-color: #f1f5f9;
            --accent-color: #38bdf8;
            --finish-color: #4ade80;
            --text-soft: #cbd5e1;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--fg-color);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
        }

        #app-container {
            flex: 1;
            display: flex;
            position: relative;
            cursor: pointer;
        }

        .tap-zone {
            flex: 1;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #center-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 2;
            width: 90%;
            max-width: 400px;
        }

        #status {
            font-size: 1.1rem;
            margin-bottom: 24px;
            color: var(--accent-color);
            font-weight: bold;
        }

        #vol-circle {
            width: 220px;
            height: 220px;
            margin: 0 auto;
            border-radius: 50%;
            border: 4px solid rgba(241, 245, 249, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #vol-value {
            font-size: 4rem;
            font-weight: 100;
        }

        #guide {
            margin-top: 20px;
            font-size: 0.8rem;
            line-height: 1.6;
            color: var(--text-soft);
            text-align: left;
            white-space: pre-line;
        }

        body.is-playing #vol-circle {
            border-color: var(--accent-color);
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.2);
        }

        body.is-finished #vol-circle {
            border-color: var(--finish-color);
        }

        .instruction {
            font-size: 0.7rem;
            opacity: 0.4;
            margin-top: 10px;
        }

        /* ログ非表示 */
        #log-area {
            display: none;
        }
    </style>
</head>
<body>

<audio id="noise" src="calmapp.m4a" loop preload="auto" crossorigin="anonymous"></audio>

<div id="app-container">
    <div class="tap-zone" onclick="handleLeftTap()"><span class="instruction">DOWN</span></div>

    <div id="center-display">
        <div id="status">TAP TO START</div>

        <div id="vol-circle">
            <span id="vol-value">0</span>
        </div>

        <div id="guide">
・イヤホンかヘッドホンを着用し、タップしてスタートしてください。リラックス音声が流れます。
・深呼吸をしながら以下の動作を繰り返してください。
-意識がノイズの音量に言ったら左をタップ
-その他の思考（不安や悩み事）に意識が入ったら右をタップ
・音量がゼロになったらリラックス完了です。
        </div>

        <div class="instruction">[SPACE] UP / [D] DOWN / [S] STOP</div>
    </div>

    <div class="tap-zone" onclick="handleRightTap()"><span class="instruction">UP</span></div>
</div>

<div id="log-area"></div>

<script>
const DISPLAY_STEP = 10;
const FADE_TIME_PER_STEP = 21;
const MAX_LOGICAL_VOL = 100;

// 💎最大音量を2倍
const REAL_VOL_LIMIT = 0.5;

const TICK_DECREASE = DISPLAY_STEP / FADE_TIME_PER_STEP / 60;

let state = {
    isPlaying: false,
    logicalVol: 0,
    mainLoop: null
};

let isManualChange = false;

const audio = document.getElementById("noise");

let audioCtx = null;
let gainNode = null;
let sourceNode = null;

function initAudioGraph() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0;

    sourceNode = audioCtx.createMediaElementSource(audio);
    sourceNode.connect(gainNode);
    gainNode.connect(audioCtx.destination);
}

function logEvent(action) {
    const el = document.createElement('p');
    el.textContent = `[${new Date().toLocaleTimeString()}] ${action} (Disp: ${Math.round(state.logicalVol)})`;
    document.getElementById('log-area').prepend(el);
}

function runLoop() {
    if (!state.isPlaying) return;

    if (state.logicalVol > 0) {
        state.logicalVol -= TICK_DECREASE;
    } else {
        state.logicalVol = 0;
        finish();
        return;
    }

    let realVol = (state.logicalVol / 100) * REAL_VOL_LIMIT;

    if (isManualChange) {
        gainNode.gain.value = realVol;
        isManualChange = false;
    } else {
        gainNode.gain.value += (realVol - gainNode.gain.value) * 0.08;
    }

    document.getElementById('vol-value').textContent = Math.round(state.logicalVol);

    state.mainLoop = requestAnimationFrame(runLoop);
}

function startApp() {
    initAudioGraph();
    audioCtx.resume();

    state.isPlaying = true;
    state.logicalVol = 100;

    document.body.classList.add('is-playing');
    document.body.classList.remove('is-finished');
    document.getElementById('status').textContent = "ACTIVE";

    audio.currentTime = 0;
    gainNode.gain.value = 0;

    audio.play().catch(()=>{});

    logEvent("START");

    runLoop();
}

function handleUp() {
    if (!state.isPlaying) {
        startApp();
    } else {
        state.logicalVol = Math.min(state.logicalVol + DISPLAY_STEP, MAX_LOGICAL_VOL);
        isManualChange = true;
        logEvent("MANUAL_UP");
    }
}

function handleDown() {
    if (state.isPlaying) {
        state.logicalVol = Math.max(state.logicalVol - DISPLAY_STEP, 0);
        isManualChange = true;
        logEvent("MANUAL_DOWN");
    }
}

function stopApp() {
    if (!state.isPlaying) return;

    logEvent("STOP");
    state.logicalVol = 0;

    const fadeOut = setInterval(() => {
        if (gainNode.gain.value > 0.01) {
            gainNode.gain.value *= 0.8;
        } else {
            gainNode.gain.value = 0;
            audio.pause();
            clearInterval(fadeOut);
        }
    }, 16);

    finish();
}

function finish() {
    state.isPlaying = false;
    cancelAnimationFrame(state.mainLoop);

    document.getElementById('vol-value').textContent = "0";
    document.body.classList.remove('is-playing');
    document.body.classList.add('is-finished');
    document.getElementById('status').textContent = "FINISHED";
}

function handleLeftTap() { handleDown(); }
function handleRightTap() { handleUp(); }

window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (key === ' ') { e.preventDefault(); handleUp(); }
    if (key === 'd') { e.preventDefault(); handleDown(); }
    if (key === 's') { stopApp(); }
});

document.body.addEventListener("touchstart", () => {
    initAudioGraph();
    audioCtx.resume();
    audio.play().catch(()=>{});
}, { once: true });
</script>

</body>
</html>
